<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Конфликтолог</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div class="max-w-md mx-auto bg-slate-800 p-6 rounded-2xl">
        <textarea id="chatInput" rows="5" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700"></textarea>
        <button onclick="analyze()" id="btn" class="w-full mt-4 bg-purple-600 py-3 rounded-xl font-bold">АНАЛИЗИРОВАТЬ</button>
        <div id="res" class="mt-4 text-sm leading-relaxed text-gray-300"></div>
    </div>

    <script>
        async function analyze() {
            const text = document.getElementById('chatInput').value;
            const btn = document.getElementById('btn');
            const res = document.getElementById('res');
            btn.innerText = "ДУМАЮ...";
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "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",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-lite-preview:free",
                        "messages": [{"role": "user", "content": "Проанализируй переписку: " + text}]
                    })
                });
                const data = await response.json();
                res.innerText = data.choices[0].message.content;
            } catch (e) {
                res.innerText = "Ошибка: " + e.message;
            }
            btn.innerText = "АНАЛИЗИРОВАТЬ";
        }
    </script>
</body>
</html>
