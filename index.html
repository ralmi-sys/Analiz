<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Судья | Разбор ссор</title>
    <!-- Tailwind + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
        }
        .glass-card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 25px 40px -15px rgba(0,0,0,0.5);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
            transition: all 0.2s ease;
        }
        .neon-glow:focus {
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.8);
            border-color: #a855f7;
        }
        .btn-primary {
            background: linear-gradient(95deg, #8b5cf6, #ec489a);
            transition: transform 0.1s ease, box-shadow 0.2s;
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade {
            animation: fadeInUp 0.4s ease-out;
        }
        .result-card {
            background: rgba(0, 0, 0, 0.6);
            border-left: 4px solid #8b5cf6;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl glass-card rounded-2xl p-5 md:p-8 transition-all duration-300 neon-glow">
        <div class="text-center mb-6">
            <div class="inline-block p-2 rounded-full bg-purple-500/20 backdrop-blur-sm mb-2">
                <span class="text-4xl">⚖️</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">
                AI Судья
            </h1>
            <p class="text-gray-400 text-sm mt-2">Беспристрастный разбор ваших ссор</p>
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-300 mb-2 tracking-wide">📝 ВСТАВЬТЕ ТЕКСТ ПЕРЕПИСКИ</label>
            <textarea id="chatInput" rows="7" 
                class="w-full bg-black/40 border border-purple-500/40 rounded-xl p-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all resize-none"
                placeholder='Пример:
Она: Ты всегда опаздываешь, тебе вообще не важно
Он: Извини, пробки, не кипишуй
Она: Вечно у тебя отмазки...'></textarea>
        </div>

        <button id="analyzeBtn" 
            class="btn-primary w-full py-4 rounded-xl font-bold text-white text-lg shadow-xl flex items-center justify-center gap-2 transition-all">
            <span>🔍</span> РАЗОБРАТЬ ССОРУ
        </button>

        <div id="resultBlock" class="hidden mt-8 animate-fade">
            <div class="result-card rounded-xl p-5">
                <h3 class="text-xl font-bold text-purple-300 mb-3 flex items-center gap-2">
                    <span>🤖</span> Вердикт ИИ
                </h3>
                <div id="aiResponse" class="text-gray-200 leading-relaxed text-base whitespace-pre-line"></div>
            </div>
        </div>

        <div class="mt-6 text-center text-xs text-gray-500">
            ⚡ Работает на Hugging Face AI • Анонимно • Не храним данные
        </div>
    </div>

    <script>
        // ========== ВСТАВЬ СВОЙ ТОКЕН СЮДА ==========
        const HF_TOKEN = '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';   // ЗАМЕНИ НА РЕАЛЬНЫЙ ТОКЕН (начинается с hf_)
        // ============================================

        const analyzeBtn = document.getElementById('analyzeBtn');
        const chatInput = document.getElementById('chatInput');
        const resultBlock = document.getElementById('resultBlock');
        const aiResponse = document.getElementById('aiResponse');

        analyzeBtn.addEventListener('click', async () => {
            const text = chatInput.value.trim();
            if (!text) {
                alert('Вставьте текст переписки!');
                return;
            }

            // Блокируем кнопку, показываем загрузку
            const originalText = analyzeBtn.innerHTML;
            analyzeBtn.innerHTML = '<span>⏳</span> АНАЛИЗИРУЮ...';
            analyzeBtn.disabled = true;

            try {
                const response = await fetch(
                    'https://api-inference.huggingface.co/models/facebook/bart-large-mnli',
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${HF_TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            inputs: text,
                            parameters: {
                                candidate_labels: ["агрессия", "манипуляция", "уважение", "любовь", "безразличие"]
                            }
                        })
                    }
                );

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Ошибка API');
                }

                const data = await response.json();
                
                // data = { labels: [...], scores: [...] }
                const scores = data.scores;
                const labels = data.labels;
                
                if (!scores || !labels) throw new Error('Неожиданный ответ от API');

                // Находим метку с самым высоким скором
                let topLabel = labels[0];
                let topScore = scores[0];
                
                // Формируем красивый вердикт
                let verdict = '';
                let emoji = '';
                let color = '';
                
                switch(topLabel) {
                    case 'агрессия':
                        emoji = '🔴';
                        verdict = 'Явная агрессия. Кто-то переходит на личности или повышает тон. Стоит остыть.';
                        color = 'text-red-300';
                        break;
                    case 'манипуляция':
                        emoji = '🟠';
                        verdict = 'Обнаружены манипуляции (газлайтинг, чувство вины, давление). Будьте осторожны.';
                        color = 'text-orange-300';
                        break;
                    case 'уважение':
                        emoji = '🟢';
                        verdict = 'В диалоге есть уважение, обе стороны стараются услышать друг друга.';
                        color = 'text-green-300';
                        break;
                    case 'любовь':
                        emoji = '💖';
                        verdict = 'Сквозь слова чувствуется забота. Возможно, стоит просто поговорить спокойно.';
                        color = 'text-pink-300';
                        break;
                    case 'безразличие':
                        emoji = '⚪';
                        verdict = 'Один из участников проявляет безразличие, что может ранить.';
                        color = 'text-gray-300';
                        break;
                    default:
                        emoji = '🤖';
                        verdict = 'Сложно определить, но атмосфера накалена.';
                        color = 'text-purple-300';
                }
                
                const confidence = Math.round(topScore * 100);
                const resultText = `${emoji} <strong class="${color}">${topLabel.toUpperCase()}</strong> (уверенность ${confidence}%)\n\n${verdict}`;
                
                aiResponse.innerHTML = resultText;
                resultBlock.classList.remove('hidden');
                
            } catch (error) {
                console.error(error);
                let errorMsg = error.message;
                if (errorMsg.includes('Authorization')) errorMsg = 'Неверный токен. Проверь, что скопировал правильно.';
                if (errorMsg.includes('rate limit')) errorMsg = 'Слишком много запросов. Подожди минуту.';
                alert('Ошибка: ' + errorMsg);
                resultBlock.classList.add('hidden');
            } finally {
                analyzeBtn.innerHTML = originalText;
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
