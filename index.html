<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI СУДЬЯ | СИСТЕМА АНАЛИЗА</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .cyber-card {
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #bc13fe;
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
        }
        .neon-border:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }
        .btn-cyber {
            background: linear-gradient(45deg, #bc13fe, #ff00ff);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-cyber:hover {
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
            transform: scale(1.02);
        }
        .loading-bar {
            width: 0%;
            height: 2px;
            background: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-10">

    <div class="max-w-2xl w-full cyber-card rounded-lg p-6 md:p-8 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-purple-500 to-transparent opacity-50"></div>
        
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-5xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 mb-2">
                AI JUDGE v1.0
            </h1>
            <p class="text-xs tracking-[0.3em] text-purple-400 uppercase">Система беспристрастного анализа конфликтов</p>
        </header>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-purple-300 mb-2 uppercase tracking-widest">Входные данные (переписка):</label>
                <textarea id="chatInput" rows="6" 
                    class="w-full bg-black/60 border border-purple-900/50 rounded p-4 text-purple-100 placeholder-purple-900/50 focus:outline-none neon-border transition-all"
                    placeholder="Вставь сюда лог ссоры..."></textarea>
            </div>

            <button id="submitBtn" class="btn-cyber w-full py-4 rounded font-black text-white">
                Запустить анализ
            </button>

            <div id="loader" class="hidden">
                <div class="w-full bg-purple-900/20 h-[2px] mb-2">
                    <div id="bar" class="loading-bar"></div>
                </div>
                <p class="text-center text-[10px] text-purple-400 animate-pulse uppercase tracking-widest">Обработка нейросетью...</p>
            </div>

            <div id="resultWrapper" class="hidden space-y-4">
                <div class="h-px bg-purple-900/50"></div>
                <h2 class="text-sm font-bold text-pink-500 uppercase tracking-widest">Вердикт системы:</h2>
                <div id="aiResponse" class="bg-purple-950/20 border-l-2 border-pink-600 p-4 italic text-gray-200 leading-relaxed whitespace-pre-wrap text-sm md:text-base">
                </div>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('submitBtn');
        const input = document.getElementById('chatInput');
        const resultWrapper = document.getElementById('resultWrapper');
        const aiResponse = document.getElementById('aiResponse');
        const loader = document.getElementById('loader');
        const bar = document.getElementById('bar');

        btn.onclick = async () => {
            const text = input.value.trim();
            if (!text) return alert('Система требует данные для анализа!');

            // Сброс и запуск анимации
            btn.disabled = true;
            btn.style.opacity = '0.5';
            resultWrapper.classList.add('hidden');
            loader.classList.remove('hidden');
            bar.style.width = '100%';
            bar.style.transition = 'width 2s ease-in-out';

            try {
                // Запрос идет на твой собственный API на Vercel
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Ошибка доступа');

                // Парсим текст ответа
                const finalResult = data.result.alternatives[0].message.text;
                
                aiResponse.innerText = finalResult;
                resultWrapper.classList.remove('hidden');
                
            } catch (err) {
                alert('КРИТИЧЕСКИЙ СБОЙ: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
                loader.classList.add('hidden');
                bar.style.width = '0%';
                bar.style.transition = 'none';
            }
        };
    </script>
</body>
</html>
