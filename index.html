<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Конфликтолог</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">
    <main class="w-full max-w-lg glass p-6 rounded-2xl">
        <textarea id="chatInput" rows="6" class="w-full bg-slate-800 p-4 rounded-xl text-white border border-slate-700" placeholder="Вставь текст переписки..."></textarea>
        <button onclick="analyze()" id="btn" class="w-full mt-4 bg-purple-600 py-3 rounded-xl font-bold">АНАЛИЗИРОВАТЬ</button>
        <div id="resultBlock" class="hidden mt-6 text-gray-200"></div>
    </main>

    <script>
        // ВСТАВЬ СЮДА СВОЙ КЛЮЧ МЕЖДУ КАВЫЧКАМИ
        const API_KEY = 'AIzaSyBxXrhsF17adwpALJy3vSBYztK4EIZL9cU';

        async function analyze() {
            const text = document.getElementById('chatInput').value;
            const btn = document.getElementById('btn');
            const res = document.getElementById('resultBlock');
            
            btn.innerText = "ДУМАЮ...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Ты психолог. Проанализируй эту переписку на предмет манипуляций и токсичности: " + text }] }] })
                });
                const data = await response.json();
                res.innerHTML = data.candidates[0].content.parts[0].text;
                res.classList.remove('hidden');
            } catch (e) {
                alert("Ошибка: проверь ключ в коде файла!");
            }
            btn.innerText = "АНАЛИЗИРОВАТЬ";
        }
    </script>
</body>
</html>
