<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Разбор ссор</title>
    <style>
        body { background: #0f172a; color: white; font-family: system-ui; padding: 1rem; }
        textarea { width: 100%; background: #1e293b; border: none; padding: 1rem; color: white; border-radius: 1rem; }
        button { background: #8b5cf6; padding: 1rem; border: none; border-radius: 1rem; color: white; font-weight: bold; width: 100%; margin-top: 1rem; }
        .result { background: #1e293b; padding: 1rem; border-radius: 1rem; margin-top: 1rem; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>⚖️ Кто прав?</h1>
    <textarea id="chat" rows="8" placeholder="Вставь текст переписки..."></textarea>
    <button onclick="analyze()">Разобрать</button>
    <div id="result" class="result hidden"></div>

    <script>
        async function analyze() {
            const text = document.getElementById('chat').value;
            if (!text) return alert('Вставь текст');
            const btn = document.querySelector('button');
            btn.innerText = 'Анализирую...';
            btn.disabled = true;

            try {
                // Используем публичный API (без ключа, но с ограничением)
                const response = await fetch('https://api-inference.huggingface.co/models/facebook/bart-large-mnli', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        inputs: text,
                        parameters: { candidate_labels: ["агрессия", "манипуляция", "уважение", "любовь"] }
                    })
                });
                const data = await response.json();
                let verdict = '🔍 Не удалось определить.';
                if (data.scores) {
                    const top = data.labels[0];
                    if (top === 'агрессия') verdict = '🔴 Красный флаг: агрессия!';
                    else if (top === 'манипуляция') verdict = '🟠 Манипуляция в переписке.';
                    else if (top === 'уважение') verdict = '🟢 Есть уважение.';
                    else verdict = '🤷‍♂️ Сложно сказать.';
                }
                document.getElementById('result').innerHTML = `<strong>Вердикт:</strong><br>${verdict}`;
                document.getElementById('result').classList.remove('hidden');
            } catch(e) {
                alert('Ошибка: ' + e.message);
            } finally {
                btn.innerText = 'Разобрать';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
