<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Судья | Разбор ссор</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b); }
        .glass-card { background: rgba(15, 25, 45, 0.65); backdrop-filter: blur(16px); border: 1px solid rgba(139, 92, 246, 0.3); }
        .neon-glow { box-shadow: 0 0 15px rgba(139, 92, 246, 0.5); transition: all 0.2s ease; }
        .neon-glow:focus { box-shadow: 0 0 25px rgba(139, 92, 246, 0.8); border-color: #a855f7; }
        .btn-primary { background: linear-gradient(95deg, #8b5cf6, #ec489a); transition: transform 0.1s ease; }
        .btn-primary:active { transform: scale(0.97); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeInUp 0.4s ease-out; }
        .result-card { background: rgba(0, 0, 0, 0.6); border-left: 4px solid #8b5cf6; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl glass-card rounded-2xl p-5 md:p-8 transition-all duration-300 neon-glow">
        <div class="text-center mb-6">
            <div class="inline-block p-2 rounded-full bg-purple-500/20 backdrop-blur-sm mb-2">
                <span class="text-4xl">⚖️</span>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">
                AI Судья
            </h1>
            <p class="text-gray-400 text-sm mt-2">Беспристрастный разбор ваших ссор</p>
        </div>

        <div class="mb-5">
            <label class="block text-sm font-medium text-gray-300 mb-2 tracking-wide">📝 ВСТАВЬТЕ ТЕКСТ ПЕРЕПИСКИ</label>
            <textarea id="chatInput" rows="7" 
                class="w-full bg-black/40 border border-purple-500/40 rounded-xl p-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500 transition-all resize-none"
                placeholder='Пример:
Она: Ты заебал меня
Он: Сама дура
Она: Ты всегда так, иди нахуй'></textarea>
        </div>

        <button id="analyzeBtn" 
            class="btn-primary w-full py-4 rounded-xl font-bold text-white text-lg shadow-xl flex items-center justify-center gap-2 transition-all">
            <span>🔍</span> РАЗОБРАТЬ ССОРУ
        </button>

        <div id="resultBlock" class="hidden mt-8 animate-fade">
            <div class="result-card rounded-xl p-5">
                <h3 class="text-xl font-bold text-purple-300 mb-3 flex items-center gap-2">
                    <span>🤖</span> Вердикт ИИ
                </h3>
                <div id="aiResponse" class="text-gray-200 leading-relaxed text-base whitespace-pre-line"></div>
            </div>
        </div>

        <div class="mt-6 text-center text-xs text-gray-500">
            ⚡ Работает на Yandex GPT • Анонимно • Не храним данные
        </div>
    </div>

    <script>
        const analyzeBtn = document.getElementById('analyzeBtn');
        const chatInput = document.getElementById('chatInput');
        const resultBlock = document.getElementById('resultBlock');
        const aiResponse = document.getElementById('aiResponse');

        analyzeBtn.addEventListener('click', async () => {
            const text = chatInput.value.trim();
            if (!text) {
                alert('Вставьте текст переписки!');
                return;
            }

            analyzeBtn.innerHTML = '<span>⏳</span> АНАЛИЗИРУЮ...';
            analyzeBtn.disabled = true;
            resultBlock.classList.add('hidden');

            try {
                // ВАЖНО: Запрос идет на твой бэкенд Vercel
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                // Проверяем, нет ли ошибки от сервера
                if (data.error) {
                    throw new Error(data.error);
                }

                // Безопасно достаем текст из ответа Яндекса
                if (data.result && data.result.alternatives && data.result.alternatives[0]) {
                    const result = data.result.alternatives[0].message.text;
                    aiResponse.innerHTML = result;
                    resultBlock.classList.remove('hidden');
                } else {
                    throw new Error('Некорректный ответ от нейросети');
                }

            } catch (error) {
                console.error('Ошибка:', error);
                alert('Ошибка: ' + error.message);
            } finally {
                analyzeBtn.innerHTML = '<span>🔍</span> РАЗОБРАТЬ ССОРУ';
                analyzeBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
