<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Конфликтолог | Кто прав?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-border { border: 1px solid #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="text-center my-10">
        <h1 class="text-4xl font-bold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">
            Разбор Ссоры ИИ
        </h1>
        <p class="text-gray-400 mt-2 text-sm text-balance">Загрузи текст переписки, и я скажу, кто здесь токсик</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-3xl p-6 neon-border">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-400 mb-2 font-mono uppercase tracking-widest">Текст переписки:</label>
            <textarea id="chatInput" rows="8" 
                class="w-full bg-slate-800 rounded-xl p-4 text-white focus:ring-2 focus:ring-purple-500 outline-none transition-all border border-slate-700"
                placeholder="Вставь сюда текст вашей ссоры..."></textarea>
        </div>

        <button onclick="analyzeChat()" id="btn"
            class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95">
            ПРОАНАЛИЗИРОВАТЬ
        </button>

        <div id="resultBlock" class="hidden mt-8 border-t border-slate-700 pt-6">
            <h3 class="text-xl font-bold text-purple-400 mb-4">Вердикт ИИ:</h3>
            <div id="aiResponse" class="text-gray-200 leading-relaxed whitespace-pre-line">
                </div>
        </div>
    </main>

    <footer class="mt-10 text-gray-500 text-xs text-center">
        Сервис носит развлекательный характер. <br> Анонимно. Бесплатно. Беспристрастно.
    </footer>

    <script>
        // ТВОЙ API КЛЮЧ (Вставь его сюда)
        const API_KEY = 'AIzaSyCdETzbTxYsZ3aJwgYmLedVVXZDzUX6TCs';

        async function analyzeChat() {
            const text = document.querySelector('#chatInput').value;
            const btn = document.querySelector('#btn');
            const resultBlock = document.querySelector('#resultBlock');
            const aiResponse = document.querySelector('#aiResponse');

            if (!text) return alert("Сначала вставь текст!");

            // Индикация загрузки
            btn.innerText = "АНАЛИЗИРУЮ...";
            btn.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `Ты экспертный психолог-конфликтолог. Проанализируй эту переписку. Определи, кто ведет себя агрессивно, есть ли манипуляции (газлайтинг, пассивная агрессия) и кто в итоге прав с точки зрения здоровых отношений. Дай краткий и честный вердикт. Вот текст: ${text}` }]
                        }]
                    })
                });

                const data = await response.json();
                const result = data.candidates[0].content.parts[0].text;

                resultBlock.classList.remove('hidden');
                aiResponse.innerText = result;
            } catch (error) {
                alert("Ошибка! Проверь API ключ или интернет.");
                console.error(error);
            } finally {
                btn.innerText = "ПРОАНАЛИЗИРОВАТЬ";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
