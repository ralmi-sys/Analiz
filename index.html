<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Разбор ссор</title>
    <style>
        body { background: #0f172a; color: white; font-family: system-ui; padding: 1rem; }
        textarea { width: 100%; background: #1e293b; border: none; padding: 1rem; color: white; border-radius: 1rem; }
        button { background: #8b5cf6; padding: 1rem; border: none; border-radius: 1rem; color: white; font-weight: bold; width: 100%; margin-top: 1rem; }
        .result { background: #1e293b; padding: 1rem; border-radius: 1rem; margin-top: 1rem; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>⚖️ Кто прав?</h1>
    <textarea id="chat" rows="8" placeholder="Вставь текст переписки..."></textarea>
    <button onclick="analyze()">Разобрать</button>
    <div id="result" class="result hidden"></div>

    <script>
        function analyze() {
            const text = document.getElementById('chat').value;
            if (!text) return alert('Вставь текст');

            let result = '';
            const lower = text.toLowerCase();

            // Простейший анализ по словам
            const aggressive = ['ты дурак', 'идиот', 'заткнись', 'тупой', 'ненавижу', 'бесишь', 'сволочь'];
            const manipulative = ['если ты', 'ты должен', 'нормальные люди', 'никто не', 'все так делают'];
            const defensive = ['неправда', 'ты придираешься', 'я не виноват', 'отстань'];

            let aggrCount = 0, manipCount = 0, defCount = 0;
            for (let word of aggressive) if (lower.includes(word)) aggrCount++;
            for (let word of manipulative) if (lower.includes(word)) manipCount++;
            for (let word of defensive) if (lower.includes(word)) defCount++;

            if (aggrCount > 2) result = '🔴 Красный флаг: явная агрессия.';
            else if (manipCount > 2) result = '🟠 Манипуляция. Кто-то давит на чувства.';
            else if (defCount > 2) result = '🟡 Защитная реакция. Один из вас оправдывается, вместо диалога.';
            else if (aggrCount === 0 && manipCount === 0 && defCount === 0) result = '🟢 Вроде конструктивно.';
            else result = '🤔 Есть напряжённость, но сложно сказать однозначно.';

            document.getElementById('result').innerHTML = `<strong>Вердикт:</strong><br>${result}`;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
